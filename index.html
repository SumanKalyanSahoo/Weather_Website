<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WeatherWave</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&family=Playfair+Display:wght@700;900&display=swap"
    rel="stylesheet">
</head>

<body>

  <!-- Animated sky background -->
  <div class="sky">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="stars" id="stars"></div>
  </div>

  <main>
    <div class="card" id="card">

      <!-- Header -->
      <div class="card-header">
        <div class="logo">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <circle cx="14" cy="14" r="6" fill="rgba(255,255,255,0.9)" />
            <path
              d="M14 2V5M14 23V26M2 14H5M23 14H26M5.5 5.5L7.6 7.6M20.4 20.4L22.5 22.5M5.5 22.5L7.6 20.4M20.4 7.6L22.5 5.5"
              stroke="rgba(255,255,255,0.7)" stroke-width="2" stroke-linecap="round" />
          </svg>
          <span>WeatherWave</span>
        </div>
        <div class="date-badge" id="date-badge"></div>
      </div>

      <!-- Search -->
      <div class="search-bar">
        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none">
          <circle cx="11" cy="11" r="7" stroke="rgba(255,255,255,0.5)" stroke-width="2" />
          <path d="M16.5 16.5L21 21" stroke="rgba(255,255,255,0.5)" stroke-width="2" stroke-linecap="round" />
        </svg>
        <input type="text" id="city" placeholder="Search city…" autocomplete="off"
          onkeydown="if(event.key==='Enter')getWeather()">
        <button id="search-btn" onclick="getWeather()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M5 12H19M13 6L19 12L13 18" stroke="white" stroke-width="2.5" stroke-linecap="round"
              stroke-linejoin="round" />
          </svg>
        </button>
      </div>

      <!-- Weather Display -->
      <div id="weather-display" class="weather-display hidden">

        <!-- City + desc -->
        <div class="city-row">
          <div>
            <div class="city-name" id="city-name"></div>
            <div class="weather-desc" id="weather-desc"></div>
          </div>
          <img id="weather-icon" alt="weather icon">
        </div>

        <!-- Temp -->
        <div class="temp-row">
          <span class="temp-value" id="temp-value"></span>
          <div class="temp-meta">
            <div id="feels-like"></div>
            <div id="humidity"></div>
            <div id="wind"></div>
          </div>
        </div>

        <!-- Divider -->
        <div class="divider"></div>

        <!-- Hourly -->
        <div class="hourly-label">Next 24 hours</div>
        <div id="hourly-forecast" class="hourly-forecast"></div>

      </div>

      <!-- Empty state -->
      <div id="empty-state" class="empty-state">
        <div class="empty-icon">
          <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
            <circle cx="32" cy="26" r="12" stroke="rgba(255,255,255,0.25)" stroke-width="2" />
            <path
              d="M32 8V11M32 41V44M14 26H17M47 26H50M18.5 12.5L20.6 14.6M43.4 37.4L45.5 39.5M18.5 39.5L20.6 37.4M43.4 14.6L45.5 12.5"
              stroke="rgba(255,255,255,0.2)" stroke-width="2" stroke-linecap="round" />
            <path d="M20 46 Q24 40 32 40 Q40 40 44 46 Q48 52 44 56 Q40 60 32 60 Q24 60 20 56 Q16 52 20 46Z"
              stroke="rgba(255,255,255,0.2)" stroke-width="2" fill="rgba(255,255,255,0.05)" />
          </svg>
        </div>
        <p class="empty-title">Discover the weather</p>
        <p class="empty-sub">Enter any city name to get<br>live weather & hourly forecast</p>
      </div>

      <!-- Error state -->
      <div id="error-state" class="error-state hidden">
        <div class="error-icon">⚠️</div>
        <p class="error-msg" id="error-msg">City not found. Try another name.</p>
      </div>

    </div>
  </main>

  <footer>
    <p>WeatherWave &nbsp;·&nbsp; Made by <strong>Suman Kalyan Sahoo</strong></p>
  </footer>

  <script src="script.js"></script>
</body>

</html>
